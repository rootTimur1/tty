apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: minikube-ca
  namespace: default
spec:
  isCA: true
  commonName: minikube-ca
  secretName: minikube-ca-secret
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: minikube-issuer
  namespace: default
spec:
  ca:
    secretName: minikube-ca-secret
