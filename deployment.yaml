apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-minikube
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-minikube
  template:
    metadata:
      labels:
        app: hello-minikube
    spec:
      containers:
      - name: web
        image: hello-minikube:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hello-minikube
spec:
  selector:
    app: hello-minikube
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-minikube
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/issuer: "minikube-issuer"
spec:
  tls:
  - hosts:
    - mysite.ept.cx
    secretName: hello-tls
  rules:
  - host: mysite.ept.cx
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: hello-minikube
            port:
              number: 80
